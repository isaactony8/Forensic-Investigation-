<script>
const data={units:[{id:'u1',label:'Unit I — Introduction',topics:[{id:'cci',label:'Cyber Crime Investigation',subtitle:'Fundamentals of investigating digital crimes',sections:[{icon:'📌',title:'Definition & Scope',content:`<p>Cyber crime investigation is the process of identifying, collecting, preserving, analysing, and presenting digital evidence to investigate offences committed using computers, networks, or digital devices.</p><p>It encompasses crimes where computers are <strong>tools</strong> (e.g., phishing, online fraud) and crimes where computers are <strong>targets</strong> (e.g., hacking, DDoS).</p><h4>Key Characteristics of Cyber Crimes</h4><ul><li>Borderless — can occur across multiple jurisdictions</li><li>Anonymous — attackers can hide behind proxies, VPNs, Tor</li><li>Ephemeral — digital evidence disappears quickly</li><li>Scalable — one attacker can target millions simultaneously</li><li>Evidence fragility — logs overwrite, RAM is volatile</li></ul><div class="case-box"><strong>Case Study — Operation Phish Phry (FBI, 2009)</strong>100 suspects across USA and Egypt were arrested for stealing banking credentials via phishing emails, resulting in $1.5 million in losses. Investigation used email headers, IP logs, and bank transaction records — a classic multi-jurisdictional cyber crime investigation.</div>`},{icon:'🔍',title:'Investigation Process',content:`<h4>Standard Steps in Cyber Crime Investigation</h4><ul><li><strong>1. First Response:</strong> Secure the scene, prevent evidence tampering, document everything</li><li><strong>2. Identification:</strong> Identify systems, devices, accounts involved</li><li><strong>3. Collection:</strong> Acquire disk images, RAM dumps, network logs</li><li><strong>4. Preservation:</strong> Use write-blockers; compute hash values (MD5/SHA-256)</li><li><strong>5. Analysis:</strong> Examine artefacts, reconstruct timeline</li><li><strong>6. Reporting:</strong> Produce court-admissible forensic report</li><li><strong>7. Presentation:</strong> Expert witness testimony in court</li></ul><div class="tags"><span class="tag info">Chain of Custody</span><span class="tag info">Write Blockers</span><span class="tag info">Hash Verification</span><span class="tag info">Forensic Imaging</span></div>`},{icon:'⚖️',title:'Legal Framework',content:`<table class="law-table"><thead><tr><th>Law</th><th>Key Provision</th></tr></thead><tbody><tr><td>IT Act 2000 (India)</td><td>Sections 43, 65, 66, 67, 69 — govern cyber crimes and investigation powers</td></tr><tr><td>IPC / BNS 2023</td><td>Sections 420, 468, 471 — fraud, forgery, cheating</td></tr><tr><td>CrPC / BNSS 2023</td><td>Search, seizure, arrest procedures for cyber offences</td></tr><tr><td>Evidence Act</td><td>Section 65B — admissibility of electronic records</td></tr></tbody></table>`}]},{id:'cwt',label:'Cyber Warfare & Terrorism',subtitle:'State-sponsored attacks and digital terrorism',sections:[{icon:'🛡️',title:'Cyber Warfare — Concepts',content:`<p>Cyber warfare refers to the use of digital attacks by nation-states or state-sponsored actors to disrupt, destroy, or gain intelligence from another country's critical infrastructure.</p><h4>Forms of Cyber Warfare</h4><ul><li><strong>Espionage:</strong> Stealing classified military/political data</li><li><strong>Sabotage:</strong> Destroying infrastructure (power grids, water systems)</li><li><strong>Propaganda:</strong> Disinformation campaigns via social media</li><li><strong>Financial Warfare:</strong> Attacking banking and stock markets</li></ul><div class="case-box"><strong>Case Study — Stuxnet Worm (2010)</strong>A sophisticated malware believed to be jointly developed by the US and Israel targeted Iran's nuclear centrifuges at Natanz. It caused ~1,000 centrifuges to spin out of control while displaying normal readings to operators — widely regarded as the first true cyber weapon deployed against physical infrastructure.</div><div class="case-box"><strong>Case Study — Ukraine Power Grid Attack (2015)</strong>Russian hackers (group Sandworm) used the BlackEnergy malware to take down three Ukrainian power distribution companies, leaving 230,000 citizens without electricity for several hours.</div>`},{icon:'💣',title:'Cyber Terrorism',content:`<p>Cyber terrorism refers to the use of computer networks to conduct violent or threatening acts intended to intimidate governments or societies for political, ideological, or religious objectives.</p><h4>Cyber Crime vs Cyber Terrorism</h4><table class="law-table"><thead><tr><th>Aspect</th><th>Cyber Crime</th><th>Cyber Terrorism</th></tr></thead><tbody><tr><td>Motive</td><td>Financial gain</td><td>Political/ideological</td></tr><tr><td>Target</td><td>Individuals/companies</td><td>Governments/critical infra</td></tr><tr><td>Scale</td><td>Smaller</td><td>Mass disruption</td></tr><tr><td>Legal framework</td><td>IT Act, IPC</td><td>UAPA + IT Act</td></tr></tbody></table><div class="tags"><span class="tag danger">UAPA (India)</span><span class="tag danger">Section 66F IT Act</span><span class="tag danger">Critical Infrastructure</span></div>`},{icon:'📱',title:'Social Networking & Terrorism',content:`<p>Terrorist organisations increasingly use social media platforms for recruitment, radicalisation, propaganda dissemination, and coordination of attacks.</p><h4>How Terrorists Exploit Social Media</h4><ul><li><strong>Recruitment:</strong> Target vulnerable youth through Facebook, Telegram, Discord</li><li><strong>Propaganda:</strong> Publish videos, manifestos on YouTube, Twitter</li><li><strong>Secure Comms:</strong> Use end-to-end encrypted apps (Signal, Telegram)</li><li><strong>Funding:</strong> Cryptocurrency and hawala networks promoted online</li></ul><div class="case-box"><strong>Case Study — ISIS Social Media Campaign</strong>ISIS used Twitter bots and Telegram channels to reach hundreds of thousands of followers across 190 countries between 2014–2016. INTERPOL and Europol's Internet Referral Unit (IRU) worked with platforms to remove 250,000+ accounts.</div>`}]},{id:'cfi',label:'Cyber Forensics & Incident Handling',subtitle:'Digital evidence science and IR methodology',sections:[{icon:'🔬',title:'Cyber Forensics — Fundamentals',content:`<p>Cyber forensics is the scientific discipline of recovering, analysing, and presenting digital evidence in a legally admissible manner.</p><h4>Branches of Digital Forensics</h4><ul><li><strong>Disk Forensics:</strong> Hard drives, SSDs, USB drives</li><li><strong>Network Forensics:</strong> Packet captures, firewall logs, IDS alerts</li><li><strong>Memory Forensics:</strong> RAM analysis for running processes, passwords</li><li><strong>Mobile Forensics:</strong> Smartphones, tablets, SIM cards</li><li><strong>Cloud Forensics:</strong> Data on remote servers, SaaS platforms</li><li><strong>Email Forensics:</strong> Header analysis, metadata extraction</li></ul><h4>Locard's Exchange Principle</h4><p>Every digital interaction leaves a trace — access logs, registry entries, temp files, browser history. The investigator's job is to find and preserve these traces before they are overwritten.</p>`},{icon:'🚨',title:'Incident Handling (IR) Process',content:`<p>The NIST Incident Response Lifecycle provides a framework for handling cyber incidents systematically:</p><h4>NIST IR Phases</h4><ul><li><strong>1. Preparation:</strong> IR policy, tools, trained team, playbooks ready</li><li><strong>2. Detection & Analysis:</strong> Identify the incident, assess severity, classify type</li><li><strong>3. Containment:</strong> Short-term (isolate system) + long-term (patch, rebuild)</li><li><strong>4. Eradication:</strong> Remove malware, close vulnerabilities, reset credentials</li><li><strong>5. Recovery:</strong> Restore systems, validate functionality, monitor for recurrence</li><li><strong>6. Post-Incident Activity:</strong> Lessons learned report, update IR plan</li></ul><div class="case-box"><strong>Case Study — Sony Pictures Hack (2014)</strong>Attackers (attributed to North Korea) breached Sony's network using spear-phishing, deployed the Destover wiper malware, and leaked 100TB of data — a textbook complex IR scenario demonstrating all six NIST phases.</div>`}]},{id:'cfb',label:'Cyber Forensic Basics',subtitle:'Core technical concepts every investigator must know',sections:[{icon:'💾',title:'Storage Fundamentals',content:`<h4>Types of Storage Media</h4><table class="law-table"><thead><tr><th>Type</th><th>Key Forensic Considerations</th></tr></thead><tbody><tr><td>HDD (Magnetic)</td><td>Sectors, tracks, cylinders; deleted data recoverable until overwritten</td></tr><tr><td>SSD (Flash)</td><td>TRIM command may instantly wipe deleted sectors; wear levelling complicates recovery</td></tr><tr><td>RAM (Volatile)</td><td>Lost on power-off; contains passwords, encryption keys, running processes</td></tr><tr><td>Cloud Storage</td><td>Data may be in multiple geographic jurisdictions; needs legal process (MLAT)</td></tr><tr><td>Mobile NAND</td><td>Chip-off forensics required for hardware-encrypted devices</td></tr></tbody></table><h4>Key Concepts</h4><ul><li><strong>Sector:</strong> Smallest addressable unit (512 bytes or 4KB)</li><li><strong>Cluster:</strong> Group of sectors allocated as a unit by the OS</li><li><strong>Slack Space:</strong> Unused space within a cluster — may contain residual data</li><li><strong>Unallocated Space:</strong> Clusters marked free — deleted files often recoverable here</li></ul>`},{icon:'📂',title:'File System Concepts',content:`<h4>Major File Systems</h4><table class="law-table"><thead><tr><th>File System</th><th>OS</th><th>Forensic Notes</th></tr></thead><tbody><tr><td>NTFS</td><td>Windows</td><td>Master File Table (MFT); alternate data streams; journaling; timestamps</td></tr><tr><td>FAT32/exFAT</td><td>USB/SD cards</td><td>No journaling; simple; widely used on removable media</td></tr><tr><td>ext4</td><td>Linux</td><td>Journaling; inode structure; extensive metadata</td></tr><tr><td>APFS</td><td>macOS/iOS</td><td>Copy-on-write; snapshots; full-disk encryption</td></tr></tbody></table><h4>Forensically Important Artefacts</h4><ul><li><strong>MFT (NTFS):</strong> Metadata for every file — created/modified/accessed timestamps</li><li><strong>$Recycle.Bin:</strong> Deleted files with original path and deletion timestamp</li><li><strong>Prefetch Files:</strong> Evidence of program execution (Windows)</li><li><strong>Registry Hives:</strong> User activity, USB history, recently accessed files</li></ul>`},{icon:'🔐',title:'Hash Values & Chain of Custody',content:`<p>Hash values are the cornerstone of digital forensics integrity. A cryptographic hash function produces a fixed-size fingerprint of any data — even a single-bit change produces a completely different hash.</p><h4>Common Hash Algorithms</h4><ul><li><strong>MD5:</strong> 128-bit; fast; widely used in forensics for integrity checks</li><li><strong>SHA-1:</strong> 160-bit; deprecated for security but used in older cases</li><li><strong>SHA-256:</strong> 256-bit; gold standard for forensic integrity verification</li></ul><h4>Chain of Custody</h4><p>A documented paper trail recording who collected, handled, analysed, and stored evidence. Any gap in the chain can make evidence inadmissible in court.</p><div class="tags"><span class="tag info">Write Blockers</span><span class="tag info">Forensic Imaging (DD/FTK)</span><span class="tag info">Hash Verification</span><span class="tag success">Admissibility</span></div>`}]}]},{id:'u2',label:'Unit II — Real World Cases',topics:[{id:'smp',label:'Social Media Impersonation',subtitle:'Fake profiles, identity theft online',sections:[{icon:'📌',title:'Overview & Offence Types',content:`<p>Social media profile impersonation involves creating a fake account using another person's name, photos, and personal details to deceive others — for financial fraud, defamation, harassment, or manipulation.</p><h4>Types of Impersonation</h4><ul><li><strong>Identity Impersonation:</strong> Cloning someone's profile to deceive their contacts</li><li><strong>Celebrity Impersonation:</strong> Fake accounts of public figures for scams or misinformation</li><li><strong>Corporate Impersonation:</strong> Fake company pages for phishing or brand damage</li><li><strong>Government Impersonation:</strong> Fake official accounts to spread disinformation</li></ul><div class="case-box"><strong>Case Study — Fake IPS Officer Profile (2022)</strong>A fraudster created a fake Facebook profile impersonating an IPS officer in Ahmedabad, extorting money from businessmen by threatening false arrests. Digital forensics traced the account through IP logs and the suspect's Aadhaar-linked phone number used for OTP verification.</div>`},{icon:'🔍',title:'Digital Evidence Collection',content:`<ul><li>Screenshot the fake profile with URL visible, timestamp, and profile metadata</li><li>Preserve all messages sent from the fake account</li><li>Request platform data via legal process (MLAT for foreign platforms)</li><li>Obtain IP address logs, login timestamps, and device fingerprints from the platform</li><li>Trace IP to ISP subscriber using court order</li><li>Examine suspect's device for profile management apps and stolen photos</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th><th>Punishment</th></tr></thead><tbody><tr><td>Section 66C IT Act</td><td>Identity theft using electronic means</td><td>Up to 3 years + ₹1 lakh fine</td></tr><tr><td>Section 66D IT Act</td><td>Cheating by impersonation via computer</td><td>Up to 3 years + ₹1 lakh fine</td></tr><tr><td>Section 468 IPC</td><td>Forgery for cheating</td><td>Up to 7 years</td></tr><tr><td>Section 500 IPC</td><td>Defamation</td><td>Up to 2 years + fine</td></tr></tbody></table>`}]},{id:'phish',label:'Phishing Cases',subtitle:'Email, SMS & voice-based deception attacks',sections:[{icon:'📌',title:'Types of Phishing',content:`<p>Phishing is a social engineering attack that tricks victims into revealing credentials, financial information, or installing malware through deceptive communications.</p><h4>Phishing Variants</h4><ul><li><strong>Email Phishing:</strong> Mass emails mimicking banks, government, courier companies</li><li><strong>Spear Phishing:</strong> Targeted attack using victim's personal details to appear credible</li><li><strong>Vishing (Voice):</strong> Phone calls posing as bank, IT support, tax authority</li><li><strong>Smishing (SMS):</strong> "Your parcel is held, click link" text messages</li><li><strong>Pharming:</strong> DNS poisoning that redirects genuine URLs to fake sites</li><li><strong>Whaling:</strong> Targeting C-level executives with highly personalised attacks</li></ul><div class="case-box"><strong>Case Study — Jamtara Phishing Gang (Jharkhand)</strong>A network of young fraudsters from Jamtara district conducted mass vishing operations, posing as SBI/ICICI officials to extract OTPs, defrauding thousands across India. Investigation used CDR analysis, IMEI tracing, and tower dump analysis.</div>`},{icon:'🔍',title:'Investigation Techniques',content:`<ul><li><strong>Email Header Analysis:</strong> Trace X-Originating-IP, Received headers, SPF/DKIM failures</li><li><strong>Phishing URL Analysis:</strong> WHOIS lookup, domain registration date, hosting IP</li><li><strong>Sandbox Analysis:</strong> Execute phishing link in isolated VM to observe behaviour</li><li><strong>Bank Records:</strong> Trace money mule accounts, beneficiary KYC details</li><li><strong>CDR Analysis:</strong> Call detail records from telecom to map suspect network</li><li><strong>IMEI Tracking:</strong> Identify the physical device used for vishing calls</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th></tr></thead><tbody><tr><td>Section 66 IT Act</td><td>Hacking / creating fraudulent websites</td></tr><tr><td>Section 66C IT Act</td><td>Identity theft via electronic means</td></tr><tr><td>Section 66D IT Act</td><td>Cheating by impersonation online</td></tr><tr><td>Section 420 IPC</td><td>Cheating and inducing delivery of property</td></tr><tr><td>Section 468 IPC</td><td>Forgery for purpose of cheating</td></tr></tbody></table>`}]},{id:'dtc',label:'Data Theft Cases',subtitle:'Insider threats and external data breaches',sections:[{icon:'📌',title:'Types of Data Theft',content:`<p>Data theft involves the unauthorised acquisition of confidential, proprietary, or personal information from computer systems, databases, or networks.</p><h4>Common Scenarios</h4><ul><li><strong>Insider Threat:</strong> Disgruntled employee copies customer database before resignation</li><li><strong>External Breach:</strong> Hacker exploits vulnerability to exfiltrate data</li><li><strong>Supply Chain Attack:</strong> Compromising a vendor to access client data</li><li><strong>Physical Theft:</strong> Stealing laptops, USBs, hard drives with sensitive data</li><li><strong>Cloud Misconfiguration:</strong> Exposed S3 buckets, unprotected APIs</li></ul><div class="case-box"><strong>Case Study — Air India Data Breach (2021)</strong>SITA, the IT provider for Air India, was breached, exposing personal data of 4.5 million passengers including passport numbers, credit card details, and dates of birth. Investigation traced the breach to a SQL injection vulnerability in SITA's passenger service system.</div>`},{icon:'🔍',title:'Forensic Evidence',content:`<ul><li><strong>DLP Logs:</strong> Data Loss Prevention system logs showing unusual file transfers</li><li><strong>USB Device History:</strong> Registry keys (USBSTOR) showing what was plugged in and when</li><li><strong>Email Logs:</strong> Large attachments sent to personal email, cloud sync activity</li><li><strong>Access Logs:</strong> Database query logs, user access timestamps</li><li><strong>Network Traffic:</strong> Unusual outbound data transfers, connections to unknown IPs</li><li><strong>Cloud Audit Trails:</strong> AWS CloudTrail, Azure Activity Log for cloud breaches</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th></tr></thead><tbody><tr><td>Section 43 IT Act</td><td>Unauthorised access, data theft, system damage</td></tr><tr><td>Section 66 IT Act</td><td>Computer fraud and unauthorised access</td></tr><tr><td>Section 43A IT Act</td><td>Corporate liability for failure to protect data</td></tr><tr><td>Section 378 IPC</td><td>Theft (applied to physical media)</td></tr><tr><td>DPDP Act 2023</td><td>India's new data protection law — penalties up to ₹250 crore</td></tr></tbody></table>`}]},{id:'ce',label:'Corporate Espionage',subtitle:'Trade secret theft and industrial spying',sections:[{icon:'📌',title:'Nature of Corporate Espionage',content:`<p>Corporate espionage involves the theft of trade secrets, intellectual property, business strategies, or R&D data by competitors, foreign state actors, or malicious insiders to gain competitive advantage.</p><h4>Methods Used</h4><ul><li><strong>APT Attacks:</strong> Advanced Persistent Threats — long-term stealthy network infiltration</li><li><strong>Insider Recruitment:</strong> Bribing employees to leak confidential information</li><li><strong>Social Engineering:</strong> Manipulating employees into revealing access credentials</li><li><strong>Physical Intrusion:</strong> Dumpster diving, office infiltration</li></ul><div class="case-box"><strong>Case Study — Coca-Cola vs China National Foods (2015)</strong>A former Coca-Cola scientist was arrested for stealing formulas worth $119 million. She transferred data to a USB drive and emailed documents to a Chinese state-owned company. Digital forensics recovered deleted emails and USB transfer logs as key evidence.</div>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th></tr></thead><tbody><tr><td>Section 66 IT Act</td><td>Unauthorised access to computer resources</td></tr><tr><td>Section 66B IT Act</td><td>Receiving stolen computer resources</td></tr><tr><td>Section 43 IT Act</td><td>Damage/data theft from computer systems</td></tr><tr><td>Section 408 IPC</td><td>Criminal breach of trust by employee</td></tr><tr><td>Trade Secrets (common law)</td><td>Civil remedy — injunction + damages</td></tr></tbody></table>`}]},{id:'ef',label:'Email Fraud Cases',subtitle:'BEC, advance fee, and impersonation frauds',sections:[{icon:'📌',title:'Types of Email Fraud',content:`<p>Email fraud encompasses a range of deceptive schemes conducted via email to steal money, credentials, or sensitive information.</p><h4>Common Email Fraud Types</h4><ul><li><strong>Business Email Compromise (BEC):</strong> Hacker gains access to executive's email and orders wire transfers</li><li><strong>Advance Fee Fraud (419):</strong> "Nigerian Prince" — promise of large sum in exchange for upfront payment</li><li><strong>Invoice Fraud:</strong> Fake invoices from impersonated vendor with changed bank details</li><li><strong>CEO Fraud:</strong> Spoofed email impersonating CEO instructs finance team to transfer funds</li></ul><div class="case-box"><strong>Case Study — BEC Attack on FACC (Austria, 2016)</strong>Austrian aerospace manufacturer FACC lost €50 million through a CEO fraud attack. A finance employee received a spoofed email appearing to come from the CEO, instructing an urgent wire transfer for an "acquisition project."</div>`},{icon:'🔍',title:'Email Forensics Techniques',content:`<ul><li><strong>Header Analysis:</strong> Examine "Received" chain, X-Originating-IP, Reply-To vs From</li><li><strong>SPF/DKIM/DMARC:</strong> Check if email authentication protocols were bypassed</li><li><strong>Metadata Extraction:</strong> Sender's time zone, mail client, MIME structure</li><li><strong>IP Geolocation:</strong> Trace originating server IP to country/hosting provider</li><li><strong>Mail Server Logs:</strong> SMTP logs showing full delivery chain</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th></tr></thead><tbody><tr><td>Section 66 IT Act</td><td>Computer fraud / email spoofing</td></tr><tr><td>Section 66C IT Act</td><td>Identity theft using electronic means</td></tr><tr><td>Section 420 IPC</td><td>Cheating and inducing delivery of property</td></tr><tr><td>Section 465 IPC</td><td>Forgery (creating fake documents/emails)</td></tr><tr><td>Section 468 IPC</td><td>Forgery for purpose of cheating</td></tr></tbody></table>`}]},{id:'ccf',label:'Credit Card Fraud',subtitle:'Skimming, cloning & online card fraud',sections:[{icon:'📌',title:'Types & Methods',content:`<p>Credit card fraud involves unauthorised use of another person's card details for financial transactions — whether physical or digital.</p><h4>Fraud Methods</h4><ul><li><strong>Card Skimming:</strong> Physical device installed on ATM/POS terminal captures magnetic stripe data</li><li><strong>Carding:</strong> Testing stolen card numbers on small transactions before large fraud</li><li><strong>CNP (Card Not Present):</strong> Using stolen details for online purchases without physical card</li><li><strong>Account Takeover:</strong> Gaining control of victim's bank account via credential theft</li></ul><div class="case-box"><strong>Case Study</strong>Customer notices multiple international transactions. Investigation reveals card details were used on an e-commerce site through skimming or data breach. Forensic IP logs, device fingerprints, and transaction records trace the accused. Charged under Sections 66C, 66D IT Act + Section 420 IPC.</div>`},{icon:'🔍',title:'Forensic Evidence',content:`<ul><li>IP address and device fingerprint from e-commerce server logs</li><li>Payment gateway transaction logs with geolocation</li><li>Physical skimming device (fingerprints, Bluetooth transmitter)</li><li>CCTV footage from ATM/POS location</li><li>Bank transaction timeline analysis</li><li>Dark web marketplace evidence if data was sold</li></ul>`},{icon:'⚖️',title:'Legal Provisions & Punishment',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th><th>Max Punishment</th></tr></thead><tbody><tr><td>Sec 66C IT Act</td><td>Identity theft</td><td>3 years + ₹1 lakh fine</td></tr><tr><td>Sec 66D IT Act</td><td>Cheating by personation</td><td>3 years + ₹1 lakh fine</td></tr><tr><td>Sec 420 IPC</td><td>Cheating</td><td>7 years + fine</td></tr><tr><td>Sec 468 IPC</td><td>Forgery for cheating</td><td>7 years + fine</td></tr></tbody></table>`}]},{id:'cpp',label:'Cyber Pornography',subtitle:'CSAM and obscene content distribution',sections:[{icon:'📌',title:'Nature of Offence',content:`<p>Cyber pornography encompasses the creation, distribution, storage, or consumption of obscene content through digital means — with CSAM (Child Sexual Abuse Material) being the most serious category.</p><div class="case-box"><strong>Case Study</strong>Police receive tip about illegal obscene videos shared through a private encrypted messaging group where some members are minors. Content stored on cloud, distributed via end-to-end encrypted apps. Requires MLAT requests to foreign platforms, NCMEC reports, strict CSAM handling protocols, and careful victim protection under POCSO.</div><div class="tags"><span class="tag danger">CSAM — Most Severe Offence</span><span class="tag warn">Minor Victim Protections Apply</span><span class="tag info">NCMEC Coordination</span></div>`},{icon:'⚖️',title:'Legal Provisions & Punishment',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th><th>Max Punishment</th></tr></thead><tbody><tr><td>Sec 67 IT Act</td><td>Transmitting obscene material</td><td>5 years + ₹10 lakh fine (repeat)</td></tr><tr><td>Sec 67B IT Act</td><td>Child pornography online</td><td>7 years + ₹10 lakh fine (repeat)</td></tr><tr><td>Sec 14 POCSO</td><td>Using child for pornography</td><td>Life imprisonment</td></tr><tr><td>Sec 15 POCSO</td><td>Storage/possession of CSAM</td><td>Up to 7 years + fine</td></tr><tr><td>Sec 292 IPC</td><td>Distribution of obscene material</td><td>5 years (repeat)</td></tr></tbody></table>`}]},{id:'dos',label:'DoS / DDoS Attacks',subtitle:'Denial of Service attack investigation',sections:[{icon:'📌',title:'Types of DoS Attacks',content:`<p>A Denial of Service (DoS) attack attempts to make a computer or network resource unavailable by overwhelming it with traffic or exploiting vulnerabilities. A DDoS uses thousands of compromised machines (botnet).</p><h4>Attack Types</h4><ul><li><strong>Volumetric:</strong> Flood attack — UDP flood, ICMP flood, DNS amplification</li><li><strong>Protocol:</strong> SYN flood, Ping of Death, Smurf attack — exploits layer 3/4 weaknesses</li><li><strong>Application Layer (Layer 7):</strong> HTTP GET/POST flood targeting web servers</li><li><strong>Botnets:</strong> IoT devices, compromised PCs used as attack zombies</li><li><strong>Ransom DDoS (RDDoS):</strong> Attackers demand cryptocurrency to stop the attack</li></ul><div class="case-box"><strong>Case Study — GitHub DDoS (2018)</strong>GitHub suffered the largest DDoS ever recorded at the time — 1.35 Tbps — using Memcached amplification (amplification factor of 51,000x). The attack lasted only 20 minutes as GitHub routed traffic through Akamai's DDoS mitigation network.</div>`},{icon:'🔍',title:'Investigation & Evidence',content:`<ul><li><strong>NetFlow/PCAP Analysis:</strong> Capture and analyse packet flows during the attack</li><li><strong>Server Logs:</strong> Web server access logs showing request volume and source IPs</li><li><strong>ISP Records:</strong> Upstream traffic analysis from the target's ISP</li><li><strong>Botnet C2 Analysis:</strong> Identify Command and Control servers directing the botnet</li><li><strong>IP Correlation:</strong> Cross-reference attack IPs across honeypot databases, OSINT</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th><th>Punishment</th></tr></thead><tbody><tr><td>Sec 43(f) IT Act</td><td>Denial of access to authorised user</td><td>Compensation (civil)</td></tr><tr><td>Sec 66 IT Act</td><td>Computer-related offence</td><td>Up to 3 years or ₹5 lakh fine</td></tr><tr><td>Sec 66F IT Act</td><td>Cyber terrorism (if targeting critical infrastructure)</td><td>Life imprisonment</td></tr><tr><td>Sec 425 IPC</td><td>Mischief causing damage</td><td>Up to 2 years</td></tr></tbody></table>`}]},{id:'cdf',label:'Cyber Defamation',subtitle:'Online reputation attacks and false statements',sections:[{icon:'📌',title:'What is Cyber Defamation?',content:`<p>Cyber defamation is the publication of false statements of fact about a person through electronic means — websites, social media, email, forums — that damages their reputation.</p><h4>Forms of Cyber Defamation</h4><ul><li><strong>Libel (Written):</strong> False statements posted on blogs, forums, social media</li><li><strong>Fake News:</strong> Fabricated stories about a person published online</li><li><strong>Morphed Images:</strong> Digitally altered images used to humiliate or falsely implicate</li><li><strong>Anonymous Posting:</strong> Using fake accounts or Tor to post defamatory content</li><li><strong>Review Bombing:</strong> Coordinated fake negative reviews to destroy a business</li></ul><div class="case-box"><strong>Case Study — Fake WhatsApp Message Defamation</strong>A businessman in Mumbai received a forwarded WhatsApp message falsely accusing him of financial fraud with a morphed image. Police traced the origin through WhatsApp metadata and identified the source device via IMEI, leading to charges under Section 500 IPC + Section 66 IT Act.</div>`},{icon:'🔍',title:'Investigation Steps',content:`<ul><li>Preserve defamatory content with time-stamped screenshots</li><li>Use Internet Archive / Wayback Machine for already-deleted content</li><li>WHOIS lookup for anonymous websites</li><li>Platform data request for account owner details</li><li>IP log analysis to trace anonymous posters</li><li>Metadata from morphed images (EXIF data, creation software)</li></ul>`},{icon:'⚖️',title:'Legal Provisions',content:`<table class="law-table"><thead><tr><th>Section</th><th>Provision</th><th>Punishment</th></tr></thead><tbody><tr><td>Sec 499 IPC</td><td>Definition of defamation</td><td>—</td></tr><tr><td>Sec 500 IPC</td><td>Punishment for defamation</td><td>Up to 2 years + fine</td></tr><tr><td>Sec 66 IT Act</td><td>Computer-related fraud/harm</td><td>Up to 3 years</td></tr><tr><td>Sec 67 IT Act</td><td>Publishing obscene defamatory material</td><td>Up to 5 years</td></tr><tr><td>Sec 354D IPC</td><td>Cyberstalking (if persistent harassment)</td><td>Up to 3 years (repeat: 5 yrs)</td></tr></tbody></table><p style="margin-top:8px;font-size:12px;color:var(--text-tertiary)">Note: Section 66A IT Act was struck down by the Supreme Court in Shreya Singhal v. Union of India (2015) as unconstitutional.</p>`}]}]}]};

let currentUnit='u1',currentTopic=data.units[0].topics[0].id;
function renderUnitTabs(){document.getElementById('unitTabs').innerHTML=data.units.map(u=>`<button class="unit-tab ${u.id===currentUnit?'active':''}" onclick="selectUnit('${u.id}')">${u.label}</button>`).join('');}
function renderTopicList(){const unit=data.units.find(u=>u.id===currentUnit);document.getElementById('topicList').innerHTML=unit.topics.map(t=>`<button class="topic-btn ${t.id===currentTopic?'active':''}" onclick="selectTopic('${t.id}')">${t.label}</button>`).join('');}
function renderContent(){const unit=data.units.find(u=>u.id===currentUnit);const topic=unit.topics.find(t=>t.id===currentTopic);if(!topic)return;document.getElementById('contentArea').innerHTML=`<div class="topic-title">${topic.label}</div><div class="topic-subtitle">${topic.subtitle}</div>${topic.sections.map((s,i)=>`<div class="section"><div class="section-header" onclick="toggleSection(this)"><span class="section-icon">${s.icon}</span><span class="section-title">${s.title}</span><span class="section-arrow ${i===0?'open':''}">▶</span></div><div class="section-body ${i===0?'open':''}">${s.content}</div></div>`).join('')}`;}
function selectUnit(id){currentUnit=id;currentTopic=data.units.find(u=>u.id===id).topics[0].id;renderUnitTabs();renderTopicList();renderContent();}
function selectTopic(id){currentTopic=id;renderTopicList();renderContent();}
function toggleSection(header){const arrow=header.querySelector('.section-arrow');const body=header.nextElementSibling;const isOpen=body.classList.contains('open');body.classList.toggle('open',!isOpen);arrow.classList.toggle('open',!isOpen);}
renderUnitTabs();renderTopicList();renderContent();
</script>
</body>
